<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>bonfireDB — Co-founder Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --k-font-body:"Inter Tight","Inter";
  --k-font-display:"Space Grotesk","Inter Tight","Inter";
  --k-font-fallback:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --k-font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --k-measure:70ch; --k-leading:1.6;
  --k-accent:#c2410c;
  --k-accent-soft:#fdefe6;
  --k-bg:#ffffff; --k-surface:#ffffff; --k-ink:#161310; --k-ink-soft:#5c554d;
  --k-line:#ece8e3; --k-line-strong:#ddd6cd; --k-code-bg:#faf6f0; --k-mark:#ffe1c2;
}
*{box-sizing:border-box}
html{ -webkit-text-size-adjust:100%; }
body{
  margin:0; background:var(--k-bg); color:var(--k-ink);
  font-family:var(--k-font-body),var(--k-font-fallback);
  font-size:18px; line-height:var(--k-leading);
  font-feature-settings:"kern","liga","calt"; text-rendering:optimizeLegibility;
}
.k-shell{ display:grid; grid-template-columns:minmax(0,1fr) 232px; column-gap:52px; max-width:1240px; margin:0 auto; padding:0 44px; }
.k-main{ grid-column:1; min-width:0; padding:48px 0 140px; }
.k-toc{ grid-column:2; position:sticky; top:0; align-self:start; max-height:100vh;
  overflow:auto; padding:52px 0 48px 24px; font-size:12px; line-height:1.6; border-left:1px solid var(--k-line);
  font-family:var(--k-font-mono); letter-spacing:.01em; }
.k-toc a{ display:block; color:var(--k-ink-soft); text-decoration:none; padding:3px 0 3px 12px; border-left:2px solid var(--k-line); }
.k-toc a:hover{ color:var(--k-accent); border-left-color:var(--k-accent); }
.k-toc a.lvl-3{ padding-left:26px; }
.k-header{ margin-bottom:30px; }
.k-brand{ display:inline-flex; align-items:center; gap:12px; }
.k-header .k-brand img{ height:38px; width:auto; display:block; }
.k-brand span{ font-family:var(--k-font-display); font-weight:700; font-size:19px; letter-spacing:-.01em; color:var(--k-ink); text-transform:none; }
.k-main h1{ font-family:var(--k-font-display); font-size:2.2rem; font-weight:700; line-height:1.12; letter-spacing:-0.025em; margin:.1em 0 .3em; text-wrap:balance; }
.k-main h2{ font-family:var(--k-font-display); font-size:1.42rem; font-weight:700; line-height:1.2; letter-spacing:-0.02em; margin:2.1em 0 .55em; padding-bottom:.28em; border-bottom:2px solid var(--k-accent); text-wrap:balance; }
.k-main h3{ font-family:var(--k-font-display); font-size:1.12rem; font-weight:600; letter-spacing:-.01em; margin:1.7em 0 .45em; }
.k-main h4{ font-size:1rem; margin:1.4em 0 .4em; color:var(--k-ink-soft); }
.k-main a{ color:var(--k-accent); text-decoration:none; border-bottom:1px solid var(--k-accent); }
.k-main a:hover{ background:var(--k-accent-soft); }
.k-main strong{ font-weight:600; }
.k-main blockquote{ margin:1.3em 0; padding:.5em 1.1em; border-left:3px solid var(--k-accent); background:var(--k-accent-soft); color:var(--k-ink-soft); }
.k-main code{ font-family:var(--k-font-mono); font-size:.84em; background:var(--k-code-bg); padding:.12em .4em; border:1px solid var(--k-line-strong); overflow-wrap:break-word; }
.k-main pre{ background:var(--k-code-bg); padding:16px 18px; border:1px solid var(--k-line-strong); border-left:3px solid var(--k-accent); overflow:visible; white-space:pre-wrap; word-wrap:break-word; }
.k-main pre code{ background:none; padding:0; border:0; font-size:.84em; line-height:1.5; white-space:pre-wrap; }
.k-main mark{ background:var(--k-mark); padding:.05em .25em; }
.k-main hr{ border:none; border-top:1px solid var(--k-line-strong); margin:2.4em 0; }
.k-main table{ border-collapse:collapse; width:100%; margin:1.3em 0; font-size:.9em; table-layout:auto; }
.k-main th,.k-main td{ border:1px solid var(--k-line-strong); padding:9px 12px; text-align:left; vertical-align:top; overflow-wrap:break-word; }
.k-main th{ background:var(--k-accent-soft); font-weight:600; color:var(--k-ink); border-bottom:2px solid var(--k-accent); font-family:var(--k-font-mono); font-size:.92em; }
.k-main img{ max-width:100%; height:auto; }
.k-main ul,.k-main ol{ padding-left:1.3em; }
.k-main li{ margin:.3em 0; }
.k-main details{ border:1px solid var(--k-line-strong); border-left:3px solid var(--k-accent); margin:.55em 0; padding:2px 16px; background:var(--k-surface); }
.k-main details[open]{ padding-bottom:10px; }
.k-main summary{ cursor:pointer; padding:.55em 0; font-weight:600; font-family:var(--k-font-display); }
.k-main details ul{ margin:.2em 0 .2em; }
.k-main input[type=checkbox]{ accent-color:var(--k-accent); width:1.05em; height:1.05em; vertical-align:-2px; }
.k-main label{ cursor:pointer; }
.k-main .contains-task-list{ list-style:none; padding-left:.2em; }
.k-main .task-list-item{ display:flex; align-items:baseline; gap:.55em; }
.k-callout,.sh-callout{ margin:1.3em 0; padding:14px 18px; border:1px solid var(--k-line-strong); border-left:4px solid var(--k-accent); background:var(--k-surface); }
.sh-callout>:first-child{ margin-top:0; }
.sh-callout>:last-child{ margin-bottom:0; }
.sh-callout.info{ border-left-color:var(--k-accent); background:var(--k-accent-soft); }
.sh-callout.success{ border-left-color:#2f8f63; background:#f1faf5; }
.sh-callout.warn{ border-left-color:#c98a1c; background:#fff8ec; }
.sh-callout.danger{ border-left-color:#c0412e; background:#fdf2ef; }
.sh-callout.note{ border-left-color:var(--k-ink-soft); background:#faf8f5; }
.k-footer{ grid-column:1; padding:8px 0 80px; color:var(--k-ink-soft); font-size:12px; font-family:var(--k-font-mono); }
@media (max-width:1000px){
  .k-shell{ grid-template-columns:1fr; padding:0 24px; }
  .k-main{ grid-column:1; padding:36px 0 120px; }
  .k-footer{ grid-column:1; }
  .k-toc{ display:none; }
}
/* interactive components (hydrated by the runtime; styles live here so the runtime ships no CSS) */
.k-comp-label{font-weight:600;font-size:.92em;margin-bottom:.4em;color:var(--k-ink-soft)}
.sh-todo,.sh-list,.sh-chat-pod{margin:1.2em 0;padding:14px 16px;border:1px solid var(--k-line-strong);background:var(--k-surface)}
.k-x{margin-left:auto;border:none;background:none;color:var(--k-ink-soft);cursor:pointer;font-size:1.1em;line-height:1;opacity:.5}
.k-x:hover{opacity:1;color:var(--k-accent)}
.k-add{display:flex;margin-top:.6em}
.k-add input{flex:1;border:1px solid var(--k-line-strong);background:var(--k-bg);color:var(--k-ink);padding:7px 10px;font:inherit;font-size:.95em}
.k-counter{display:inline-flex;align-items:center;gap:14px;border:1px solid var(--k-line-strong);padding:8px 14px;background:var(--k-surface)}
.k-counter button{width:30px;height:30px;border:1px solid var(--k-line-strong);background:var(--k-bg);color:var(--k-ink);font-size:1.1em;cursor:pointer}
.k-counter-val{min-width:2ch;text-align:center;font-variant-numeric:tabular-nums;font-weight:600}
.k-tabbar{display:flex;gap:6px;margin-bottom:1em;border-bottom:1px solid var(--k-line-strong)}
.k-tab{border:none;background:none;color:var(--k-ink-soft);padding:6px 10px;cursor:pointer;border-bottom:2px solid transparent;font:inherit}
.k-tab.active{color:var(--k-ink);border-bottom-color:var(--k-accent)}
.k-chat-log{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto;margin:.4em 0}
.k-bubble{padding:9px 12px;max-width:85%;font-size:.95em;line-height:1.5;white-space:pre-wrap}
.k-bubble.user{align-self:flex-end;background:var(--k-accent);color:#fff}
.k-bubble.assistant{align-self:flex-start;background:var(--k-code-bg);color:var(--k-ink)}
.k-bubble.pending{opacity:.6;font-style:italic}
.k-bubble.error{background:none;border:1px solid #c0412e;color:#c0412e;font-style:normal}
.k-chat-form{display:flex;gap:8px;margin-top:.5em}
.k-chat-form input{flex:1;border:1px solid var(--k-line-strong);background:var(--k-bg);color:var(--k-ink);padding:8px 11px;font:inherit;font-size:.95em}
.k-chat-send{border:1px solid var(--k-accent);background:var(--k-accent);color:#fff;padding:0 16px;cursor:pointer;font:inherit}
.k-chat-send:disabled{opacity:.5;cursor:default}
/* select-to-edit overlay */
.k-edit-pill{position:fixed;z-index:9999;display:none;border:1px solid var(--k-line-strong);background:var(--k-surface);color:var(--k-ink);font:inherit;font-size:.8em;padding:5px 10px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.k-edit-pill:hover{border-color:var(--k-accent);color:var(--k-accent)}
.k-edit-target{outline:2px solid var(--k-accent);outline-offset:3px}
.k-edit-pod{position:fixed;z-index:9999;width:360px;background:var(--k-surface);border:1px solid var(--k-line-strong);padding:12px;box-shadow:0 10px 32px rgba(0,0,0,.18)}
.k-edit-pod textarea{width:100%;box-sizing:border-box;border:1px solid var(--k-line-strong);background:var(--k-bg);color:var(--k-ink);padding:8px 10px;font:inherit;font-size:.92em;resize:vertical}
.k-edit-actions{display:flex;align-items:center;gap:8px;margin-top:8px}
.k-edit-status{flex:1;font-size:.8em;color:var(--k-ink-soft)}
.k-edit-status.busy{color:var(--k-accent)}
.k-edit-status.error{color:#c0412e}
.k-edit-btn{border:1px solid var(--k-accent);background:var(--k-accent);color:#fff;padding:6px 14px;cursor:pointer;font:inherit;font-size:.88em}
.k-edit-btn.ghost{background:none;color:var(--k-ink-soft);border-color:var(--k-line-strong)}
.k-edit-btn:disabled{opacity:.5;cursor:default}
:root{--k-accent:#c2410c;--k-measure:62ch;--k-leading:1.5;}</style>
<style>
.k-shell{visibility:hidden}
#pin-gate{position:fixed;inset:0;z-index:99999;background:#fff;display:flex;align-items:center;justify-content:center;font-family:"Inter Tight",system-ui,sans-serif}
.pg-card{border:1px solid #ddd6cd;border-left:4px solid #c2410c;padding:38px 40px;width:340px;max-width:88vw;text-align:center}
.pg-title{font-family:"Space Grotesk",system-ui,sans-serif;font-weight:700;font-size:26px;color:#161310;letter-spacing:-.01em}
.pg-sub{color:#5c554d;font-size:13px;margin:8px 0 22px;line-height:1.5}
#pin-input{font-family:"JetBrains Mono",monospace;font-size:22px;letter-spacing:.45em;text-align:center;width:100%;padding:12px 8px;border:1px solid #ddd6cd;background:#fff;color:#161310;outline:none;box-sizing:border-box}
#pin-input:focus{border-color:#c2410c}
#pin-err{color:#c0412e;font-size:13px;margin-top:10px;visibility:hidden}
</style>
</head>

<main class="k-main"><!--SH-CONTENT--></main>
<nav class="k-toc" aria-label="On this page"><!--SH-TOC--></nav>
<footer class="k-footer">Confidential — bonfireDB co-founder plan</footer>
</div>
