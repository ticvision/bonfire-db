name: Loop CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  issues: read
  checks: read

jobs:
  harness:
    name: Harness syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check shell scripts
        run: bash -n scripts/loop/*.sh
      - name: Check Node scripts
        run: node --check scripts/loop/*.mjs
      - name: Test harness scripts
        run: node --test scripts/loop/*.test.mjs
      - name: Validate task registry
        run: node scripts/loop/task.mjs validate

  verify:
    name: Bonfire verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Run full verification when app scaffold exists
        run: |
          if [ ! -f package.json ]; then
            echo "package.json missing; harness-only phase, skipping app verify"
            exit 0
          fi
          scripts/loop/verify.sh

  greptile:
    name: Greptile 5/5 gate
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
      checks: read
    env:
      GH_TOKEN: ${{ secrets.GREPTILE_GH_TOKEN || github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GREPTILE_TRIGGER_URL: ${{ secrets.GREPTILE_TRIGGER_URL }}
      GREPTILE_TRIGGER_TOKEN: ${{ secrets.GREPTILE_TRIGGER_TOKEN }}
      GREPTILE_TRIGGER_COMMENT: ${{ secrets.GREPTILE_TRIGGER_COMMENT }}
      GREPTILE_TRIGGER_REQUIRED: ${{ vars.GREPTILE_TRIGGER_REQUIRED }}
    steps:
      - uses: actions/checkout@v5
      - name: Require Greptile score
        run: node scripts/loop/greptile-gate.mjs --trigger --wait-seconds 900 --poll-seconds 30
