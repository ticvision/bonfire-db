name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref (newest wins) — but never cancel a
# verification run on main, where every commit must be fully verified.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least privilege: CI only reads. No auto-merge, no deploy, no PR writes — a
# human gates every mutation (loop-harness-plan.md, A4).
permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: "1"
  DO_NOT_TRACK: "1"
  BUN_VERSION: "1.3.14"

jobs:
  # ---------------------------------------------------------------------------
  # BLOCKING — whole-tree static gates. Each runs a ROOT command over the entire
  # tree, NOT a per-package turbo task, so a gate can never silently pass because
  # a package forgot to declare its script (the fail-open-by-omission class).
  # ---------------------------------------------------------------------------
  static:
    name: static / ${{ matrix.gate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gate: [typecheck, lint, format, structural, boundaries, suppressions]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Run ${{ matrix.gate }}
        env:
          GATE: ${{ matrix.gate }}
        run: |
          set -euo pipefail
          case "$GATE" in
            typecheck)
              bunx tsc -b
              ;;
            lint)
              bunx eslint .
              ;;
            format)
              bunx biome ci .
              ;;
            structural)
              # ast-grep doubles as a slop gate: validate the rules, then scan.
              bunx ast-grep test --skip-snapshot-tests
              bunx ast-grep scan
              ;;
            boundaries)
              DIRS=""
              for d in loop packages apps drizzle seed scripts; do
                [ -d "$d" ] && DIRS="$DIRS $d"
              done
              if [ -z "$DIRS" ]; then
                echo "no source directories yet; nothing to cruise"
              else
                bunx depcruise $DIRS --config .dependency-cruiser.cjs
              fi
              ;;
            suppressions)
              # No inline semgrep suppressions in source (the bypass eslint's
              # noInlineConfig + ban-ts-comment already close for eslint/tsc).
              if grep -rn 'nosemgrep' --include='*.ts' --include='*.tsx' --include='*.mts' --include='*.cts' loop packages apps 2>/dev/null; then
                echo "inline // nosemgrep suppressions are forbidden"
                exit 1
              fi
              echo "no inline semgrep suppressions"
              ;;
          esac

  # ---------------------------------------------------------------------------
  # BLOCKING — build + test via turbo on AFFECTED packages (where affected-only
  # genuinely pays; correctness gates above always run whole-tree).
  # ---------------------------------------------------------------------------
  build-test:
    name: build-test / ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [build, test]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      # DB-backed product tests need the real stack. Boots only when the repo
      # ships a compose file (post-BF-01); the guard keeps pre-product branches
      # green. If compose exists, boot MUST succeed — no fail-open skip.
      - name: Boot product stack (DB-backed tests)
        if: matrix.task == 'test'
        run: |
          set -euo pipefail
          if [ -f docker-compose.yml ]; then
            docker compose up -d --wait
            bun run db:migrate
          else
            echo "no docker-compose.yml yet; nothing to boot"
          fi
      - name: turbo ${{ matrix.task }} (affected)
        env:
          TASK: ${{ matrix.task }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_REF:-}" ]; then
            git fetch --no-tags --quiet origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
            bunx turbo run "${TASK}" --filter="...[origin/${BASE_REF}]"
          else
            bunx turbo run "${TASK}"
          fi
      - name: Tear down product stack
        if: always() && matrix.task == 'test'
        run: |
          if [ -f docker-compose.yml ]; then docker compose down -v; fi

  # ---------------------------------------------------------------------------
  # BLOCKING — static analysis (Semgrep) using the pinned, in-repo ruleset only
  # (deterministic; no network registry fetch). --strict fails on unparseable files
  # instead of silently skipping them. Inline `// nosemgrep` suppressions are blocked
  # by the `static / suppressions` gate, not a (non-existent) CLI flag.
  # ---------------------------------------------------------------------------
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.168.0
    steps:
      - uses: actions/checkout@v7
      - name: Semgrep scan
        shell: sh
        run: |
          set -eu
          semgrep scan \
            --config semgrep.yml \
            --error \
            --strict \
            --metrics off \
            --exclude node_modules \
            --exclude dist \
            --exclude build \
            --exclude .turbo \
            --exclude coverage

  # ---------------------------------------------------------------------------
  # BLOCKING — secret scanning (gitleaks CLI, pinned + checksum-verified, explicit
  # config). Scans working tree AND git history.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.30.1"
          GITLEAKS_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          rm -f gitleaks.tar.gz
      - name: Scan working tree
        run: ./gitleaks dir . --config .gitleaks.toml --redact --no-banner --exit-code 1
      - name: Scan git history
        run: ./gitleaks git . --config .gitleaks.toml --redact --no-banner --exit-code 1

  # ---------------------------------------------------------------------------
  # BLOCKING — code-quality gates. knip (dead code / unused deps) and jscpd
  # (duplication) graduated from advisory to blocking (T6, loop-harness-plan.md)
  # now that the tree is green; a regression here fails the run like any gate.
  # ---------------------------------------------------------------------------
  quality:
    name: quality / ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [knip, jscpd]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Run ${{ matrix.tool }}
        env:
          TOOL: ${{ matrix.tool }}
        run: |
          set -eu
          case "$TOOL" in
            knip)
              bunx knip
              ;;
            jscpd)
              bunx jscpd . --ignore "**/node_modules/**,**/dist/**,**/build/**,**/.turbo/**,**/coverage/**"
              ;;
          esac
